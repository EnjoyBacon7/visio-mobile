appId: io.visio.mobile
tags:
  - requires-server
---
- launchApp
- tapOn:
    id: "home_room_url_input"
- inputText: "https://meet.example.com/abc-defg-hij"
- tapOn:
    id: "home_display_name_input"
- inputText: "Maestro Bot"
- tapOn:
    id: "home_join_button"
- extendedWaitUntil:
    visible:
      id: "call_mic_button"
    timeout: 15000
- assertVisible:
    id: "call_camera_button"
- assertVisible:
    id: "call_chat_button"
