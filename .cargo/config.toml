# ort uses load-dynamic on Linux to avoid duplicate protobuf symbols with
# webrtc-sys. Set rpath so the binary finds libonnxruntime.so next to it.
[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-args=-Wl,-rpath,$ORIGIN/lib/onnxruntime"]

# Pre-built libwebrtc uses /MT (static CRT); Rust must match to avoid LNK2038.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.'cfg(target_os = "macos")']
rustflags = ["-C", "link-arg=-ObjC"]

[target.'cfg(target_os = "ios")']
rustflags = ["-C", "link-arg=-ObjC"]

# Android 16 (API 36) requires 16KB page alignment for native libraries.
# Devices with 16KB pages silently crash on load if .so uses 4KB alignment.
[target.aarch64-linux-android]
rustflags = ["-C", "link-arg=-z", "-C", "link-arg=max-page-size=16384"]

[target.armv7-linux-androideabi]
rustflags = ["-C", "link-arg=-z", "-C", "link-arg=max-page-size=16384"]

[target.x86_64-linux-android]
rustflags = ["-C", "link-arg=-z", "-C", "link-arg=max-page-size=16384"]

[target.i686-linux-android]
rustflags = ["-C", "link-arg=-z", "-C", "link-arg=max-page-size=16384"]
