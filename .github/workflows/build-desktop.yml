name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-15
            rust-targets: aarch64-apple-darwin
            label: macos-arm64
          - platform: windows
            runner: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            label: windows-x64
          - platform: linux
            runner: ubuntu-24.04
            rust-targets: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.label }}

      # --- Linux system dependencies ---
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libva-dev \
            libpulse-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libgbm-dev

      # --- Node.js + frontend build ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: crates/visio-desktop/frontend
        run: npm ci

      - name: Build frontend
        working-directory: crates/visio-desktop/frontend
        run: npm run build

      # --- Tauri build ---
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (Linux with PipeWire)
        if: matrix.platform == 'linux'
        working-directory: crates/visio-desktop
        run: cargo tauri build --features pipewire-camera

      - name: Build Tauri app (macOS/Windows)
        if: matrix.platform != 'linux'
        working-directory: crates/visio-desktop
        shell: bash
        run: cargo tauri build
        env:
          APPLE_SIGNING_IDENTITY: "-"

      # --- Upload artifacts ---
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-arm64
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb

  # --- GitHub Release with all artifacts ---
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="desktop-build-${{ github.run_number }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Desktop Build #${{ github.run_number }} from $(date -u +%Y-%m-%d)"
          fi

          # Collect all release files (use NUL-delimited to handle spaces in names)
          FILES=()
          while IFS= read -r -d '' f; do
            FILES+=("$f")
          done < <(find artifacts -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) -print0)

          if [ ${#FILES[@]} -gt 0 ]; then
            gh release create "$TAG" \
              "${FILES[@]}" \
              --title "Desktop Build #${{ github.run_number }}" \
              --notes "$NOTES" \
              --prerelease
          else
            echo "::warning::No artifacts found for release"
          fi
